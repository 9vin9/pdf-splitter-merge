<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 병합 — PDFTools</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="merge-style.css">
</head>
<body>
<div class="page-wrap">

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="index.html" class="header-logo">
      <span class="logo-mark">✂</span>
      PDFTools
    </a>
    <nav class="header-tabs">
      <a href="index.html" class="tab-link tab-split">
        <span class="tab-icon">✂</span> 분할
      </a>
      <a href="merge.html" class="tab-link tab-merge active">
        <span class="tab-icon">⊕</span> 병합
      </a>
    </nav>
  </header>

  <!-- ── 토스트 ── -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <main class="merge-main">

    <!-- 업로드 -->
    <section>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf" multiple hidden>
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="upload-text">PDF 파일을 드래그하거나 클릭하여 업로드</p>
        <p class="upload-hint">여러 파일을 한 번에 선택할 수 있어요 · 드래그로 순서 변경 가능</p>
      </div>
    </section>

    <!-- 파일 목록 -->
    <section class="files-card" id="filesSection" style="display:none;">
      <div class="files-card-head">
        <div>
          <span class="section-label">업로드된 파일</span>
          <span class="files-card-hint" style="margin-left:8px;">드래그로 순서 변경 · 썸네일 클릭으로 미리보기</span>
        </div>
        <div class="files-card-actions">
          <button class="btn btn-ghost btn-sm" id="clearAllBtn">전체 삭제</button>
          <button class="btn btn-success btn-sm" id="mergeBtn">병합 실행</button>
        </div>
      </div>
      <div id="filesList"></div>
    </section>

    <!-- 결과 -->
    <section class="result-card" id="resultSection" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <span class="section-label">병합 결과</span>
        <button class="btn btn-ghost btn-sm" id="mergeAgainBtn">다시 병합</button>
      </div>
      <div class="merge-result-item">
        <div style="flex:1;min-width:0;">
          <div class="name-edit-wrap" style="margin-bottom:4px;">
            <input class="name-input" id="resultNameInput" spellcheck="false" value="merged">
            <span class="name-suffix">.pdf</span>
          </div>
          <div class="result-item-sub" id="resultPages">총 0페이지</div>
        </div>
        <button class="btn btn-primary" id="downloadBtn">다운로드</button>
      </div>
      <div class="merge-result-footer">
        <span style="font-size:.75rem;color:var(--text-faint);">다운로드 전 파일명을 수정할 수 있어요</span>
      </div>
    </section>

  </main>
</div>

<!-- 미리보기 모달 -->
<div class="modal-bg" id="previewModal" style="display:none;">
  <div class="preview-modal-box">
    <div class="modal-head">
      <h3 id="previewModalTitle">미리보기</h3>
      <button class="btn btn-danger-ghost" id="closePreviewBtn">×</button>
    </div>
    <div class="preview-modal-body">
      <canvas id="previewModalCanvas"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="merge-script.js"></script>
</body>
</html>
