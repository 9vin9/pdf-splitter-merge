<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 분할 — PDFTools</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrap">

  <!-- ── 헤더 ── -->
  <header class="site-header">
    <a href="index.html" class="header-logo">
      <span class="logo-mark">✂</span>
      PDFTools
    </a>
    <nav class="header-tabs">
      <a href="index.html" class="tab-link tab-split active">
        <span class="tab-icon">✂</span> 분할
      </a>
      <a href="merge.html" class="tab-link tab-merge">
        <span class="tab-icon">⊕</span> 병합
      </a>
    </nav>
  </header>

  <!-- ── 토스트 ── -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <main class="split-main">

    <!-- 업로드 -->
    <section>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf" hidden>
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="upload-text">PDF 파일을 드래그하거나 클릭하여 업로드</p>
        <p class="upload-hint">PDF 파일 1개</p>
      </div>
      <div class="file-info-bar" id="fileInfoBar" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--blue);flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="file-name" id="fileName"></span>
        <span class="file-pages" id="filePages"></span>
        <button class="btn btn-danger-ghost" id="removeFileBtn" title="파일 제거">×</button>
      </div>
    </section>

    <!-- 에디터 -->
    <section id="editorSection" style="display:none;">
      <div class="editor-wrap">

        <!-- 썸네일 -->
        <div class="thumb-col">
          <div class="thumb-scroll" id="thumbList"></div>
        </div>

        <!-- 컨트롤 + 미리보기 -->
        <div class="control-col">

          <!-- 범위 설정 -->
          <div class="range-card">
            <div class="range-card-head">
              <span class="section-label">범위 설정</span>
              <div class="sel-status">
                <span class="sel-dot" id="selDot"></span>
                <span class="sel-text" id="selText">썸네일 위에서 시작/끝 선택</span>
                <button class="btn btn-xs btn-ghost" id="clearSelBtn" style="display:none;">초기화</button>
              </div>
            </div>

            <div class="range-row">
              <div class="range-field-wrap">
                <label for="startInput">시작 페이지</label>
                <input type="number" id="startInput" class="range-field" min="1" placeholder="–">
              </div>
              <span class="range-dash">–</span>
              <div class="range-field-wrap">
                <label for="endInput">끝 페이지</label>
                <input type="number" id="endInput" class="range-field" min="1" placeholder="–">
              </div>
              <button class="btn btn-primary btn-sm" id="addRangeBtn" style="flex-shrink:0;margin-bottom:1px;">추가</button>
            </div>

            <!-- 분할 목록 -->
            <div class="ranges-list" id="rangesList" style="display:none;">
              <div class="ranges-list-head">
                <span class="section-label">분할 목록<span class="range-count-badge" id="rangeCountBadge">0</span></span>
                <button class="btn btn-success btn-sm" id="splitBtn">분할 실행</button>
              </div>
              <div class="chips-row" id="chipsRow"></div>
            </div>
          </div>

          <!-- 범위 바 -->
          <div class="range-bar" id="rangeBar" style="display:none;"></div>

          <!-- 큰 미리보기 -->
          <div class="preview-panel">
            <div class="preview-toolbar">
              <span class="page-info-txt" id="pageInfoTxt">–</span>
              <div class="page-nav">
                <button class="btn-nav" id="prevBtn">◀</button>
                <input type="number" id="pageJumpInput" class="page-jump-input" min="1" placeholder="–">
                <button class="btn-nav btn-sm" id="goBtn">이동</button>
                <button class="btn-nav" id="nextBtn">▶</button>
              </div>
            </div>
            <div class="preview-canvas-wrap">
              <canvas id="previewCanvas"></canvas>
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- 결과 -->
    <section class="result-card" id="resultSection" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <span class="section-label">분할 결과</span>
        <button class="btn btn-ghost btn-sm" id="splitAgainBtn">다시 분할</button>
      </div>
      <div id="resultList"></div>
      <div class="result-footer-row">
        <button class="btn btn-primary" id="downloadAllBtn">전체 다운로드</button>
      </div>
    </section>

    <!-- 히스토리 -->
    <section class="history-section result-card" id="historySection" style="display:none;">
      <span class="section-label" style="display:block;margin-bottom:10px;">최근 기록</span>
      <div id="historyList"></div>
    </section>

  </main>
</div>

<!-- 복구 모달 -->
<div class="modal-bg" id="restoreModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-head">
      <h3>분할 설정 복구</h3>
      <button class="btn btn-danger-ghost" id="closeRestoreBtn">×</button>
    </div>
    <div class="modal-body">
      <p>이 분할 설정으로 복구하시겠습니까?</p>
      <div class="info-box" id="restoreInfo"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost btn-sm" id="cancelRestoreBtn">취소</button>
      <button class="btn btn-primary btn-sm" id="confirmRestoreBtn">복구 후 분할</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="pdf.min.js"></script>
<script src="script.js"></script>
</body>
</html>
